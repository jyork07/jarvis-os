[jarvis]
# Port the HUD web server listens on
hud_port = 7474

# Open browser automatically on launch
open_browser = true

# Kiosk mode - launches Chrome/Edge fullscreen with no browser UI (like the TikTok)
kiosk_mode = false

# Secret token for OpenClaw improvement map API (change this)
api_token = jarvis-openclaw-secret-2026

# How often to poll system stats (seconds) - faster for responsiveness
stats_interval = 1

# How often to re-scan for services (seconds) - faster discovery
discovery_interval = 15

# Show system tray icon
tray_icon = true

[openclaw]
# Known OpenClaw ports to try (comma separated)
ports = 18789,8000,8001,9000,7500

[jayyorkbot]
ports = 8080,7070,5050,3000

[ollama]
ports = 11434
default_model = gemma3:1b
fallback_models = gemma3:1b,phi4-mini,qwen3:1.7b

[fish_tts]
ports = 7860,8765,9880

[whisper]
ports = 9000,8765,5001,6006

[docker]
ports = 2375,2376

[gemini_proxy]
ports = 4000,4001,5000

