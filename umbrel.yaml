name: jarvis
version: "1.0.0"
description: >-
  J.A.R.V.I.S. - Just A Rather Very Intelligent System. A local AI assistant with voice activation, speech recognition, and text-to-speech capabilities. Integrates with Ollama for local LLM inference and Obsidian for persistent memory.
